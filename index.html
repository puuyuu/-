<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>分菜訓練</title>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        
        /* 整體比例縮小 95% */
        html {
            transform: scale(0.95);
            transform-origin: top center;
            width: 100.5%; /* 補償縮放後的寬度 */
            height: 100.5%;
            background-color: #fffde7;
        }

        body {
            font-family: sans-serif;
            background-color: #fffde7;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* 標題區塊 */
        .header {
            width: 100%;
            padding: 10px 0;
            text-align: center;
            z-index: 100;
            position: relative;
        }
        h1 { margin: 0; font-size: 18px; color: #d84315; }
        .status-row { 
            font-size: 24px; 
            font-weight: bold; 
            margin-top: 5px; 
            background: white; 
            display: inline-block; 
            padding: 5px 15px; 
            border-radius: 10px;
            border: 2px solid #ffb74d;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        /* 菜盤區 */
        .kitchen-area {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 8px;
            flex: 1;
            padding: 10px 5px 25px 5px;
        }

        .dish-group { display: flex; flex-direction: column; align-items: center; height: 95%; }
        .side-dish { transform: scale(0.85); opacity: 0.7; }
        .main-dish { transform: scale(1.1); z-index: 10; }

        .tray-box {
            display: flex;
            align-items: flex-end;
            background: #ffffff; 
            padding: 3px;
            border-radius: 4px;
            border: 2px solid #5d4037;
            height: 80%;
        }

        .ruler {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            font-size: 14px;
            padding-right: 5px;
            font-weight: 900;
            border-right: 2px solid #5d4037;
            color: #000;
        }

        .tray {
            width: 45px;
            height: 100%;
            background: #ffffff; 
            position: relative;
            display: flex;
            flex-direction: column-reverse;
            overflow: hidden; 
            border: 1px solid #8d6e63;
        }
        .main-dish .tray { width: 95px; border: 2px solid #4caf50; }

        .food { width: 100%; transition: height 0.3s ease-out; }
        .tofu { background: #ffb74d; }
        .cabbage { background: #4caf50; }
        .veggie { background: #81c784; }

        .dish-name { margin-top: 8px; font-size: 16px; font-weight: bold; background: #fff; padding: 2px 8px; border-radius: 10px; border: 1px solid #ccc; }

        /* 下方操作面板 */
        .control-card {
            background: #fff;
            width: 100%;
            padding: 15px 10px 40px 10px;
            border-radius: 25px 25px 0 0;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
            text-align: center;
            z-index: 101;
            border-top: 6px solid #4caf50;
        }
        .counter-tool { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 15px; }
        .btn-circle {
            width: 70px; height: 70px; border-radius: 50%; border: none; font-size: 45px;
            color: white; background: #42a5f5; font-weight: bold; box-shadow: 0 4px #1976d2;
        }
        .btn-minus { background: #ffa726; box-shadow: 0 4px #f57c00; }
        #scoop-display { font-size: 60px; font-weight: bold; min-width: 120px; }
        .btn-confirm {
            background: #2ecc71; color: white; border: none; padding: 18px;
            font-size: 28px; font-weight: bold; border-radius: 40px; width: 90%;
            box-shadow: 0 5px #27ae60;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🍱 便當分菜小師傅</h1>
    <div class="status-row">
        需做：<span id="total-bento" style="color:red">--</span> 盒 | 
        第 <span id="current-bento" style="color:blue">--</span> 盒
    </div>
</div>

<div class="kitchen-area">
    <div class="dish-group side-dish">
        <div class="tray-box"><div class="ruler" id="r0"></div><div class="tray"><div id="food-0" class="food tofu"></div></div></div>
        <div class="dish-name">豆腐</div>
    </div>
    <div class="dish-group main-dish">
        <div class="tray-box"><div class="ruler" id="r1"></div><div class="tray"><div id="food-1" class="food cabbage"></div></div></div>
        <div class="dish-name" style="color:#2e7d32">高麗菜</div>
    </div>
    <div class="dish-group side-dish">
        <div class="tray-box"><div class="ruler" id="r2"></div><div class="tray"><div id="food-2" class="food veggie"></div></div></div>
        <div class="dish-name">青菜</div>
    </div>
</div>

<div class="control-card">
    <div class="counter-tool">
        <button class="btn-circle btn-minus" onclick="changeScoop(-0.5)">－</button>
        <div id="scoop-display">1.5</div>
        <button class="btn-circle btn-plus" onclick="changeScoop(0.5)">＋</button>
    </div>
    <button class="btn-confirm" onclick="doScoop()">確定打菜！</button>
</div>

<script>
    let total = 0, current = 1, scoopValue = 1.5;
    let foods = [{id:'food-0',start:0,curr:0},{id:'food-1',start:0,curr:0},{id:'food-2',start:0,curr:0}];

    function buildRulers() {
        ['r0', 'r1', 'r2'].forEach(id => {
            const r = document.getElementById(id);
            r.innerHTML = '';
            for(let i=50; i>=0; i-=5) {
                const step = document.createElement('div');
                step.innerText = i;
                r.appendChild(step);
            }
        });
    }

    function initGame() {
        total = Math.floor(Math.random() * 5) + 4;
        current = 1;
        foods.forEach(f => {
            f.start = Math.floor(Math.random() * 21) + 25;
            f.curr = f.start;
        });
        document.getElementById('total-bento').innerText = total;
        updateUI();
    }

    function changeScoop(v) {
        scoopValue = Math.max(0.5, scoopValue + v);
        document.getElementById('scoop-display').innerText = scoopValue.toFixed(1);
    }

    function updateUI() {
        document.getElementById('current-bento').innerText = current;
        document.getElementById('scoop-display').innerText = scoopValue.toFixed(1);
        foods.forEach((f, i) => {
            let h = (i===1) ? (f.curr/50*100) : ((f.start-(current-1)*(f.start/total))/50*100);
            document.getElementById(f.id).style.height = h + '%';
        });
    }

    function doScoop() {
        if (foods[1].curr < scoopValue) {
            alert("菜不夠分了！");
            initGame();
            return;
        }
        foods[1].curr = parseFloat((foods[1].curr - scoopValue).toFixed(1));
        if (current >= total) {
            alert(foods[1].curr <= 1.5 ? "大成功！分得非常精準！" : "剩下 " + foods[1].curr + " 格，可以再練習看看喔！");
            initGame();
        } else {
            current++;
            updateUI();
        }
    }

    buildRulers();
    initGame();
</script>
</body>
</html>
