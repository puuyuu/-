<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>分菜訓練</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: sans-serif;
            background-color: #fffde7;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* 頂部資訊區 (高度固定) */
        .top-info {
            height: 70px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #fff;
            border-bottom: 3px solid #ffb74d;
        }
        .status-box { font-size: 20px; font-weight: bold; }

        /* 中間遊戲區 (自動填充) */
        .main-game {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding: 10px 5px;
            gap: 8px;
        }

        .dish-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 95%; /* 菜盤高度盡量拉長 */
        }

        /* 尺標與菜盤的容器 */
        .scale-container {
            display: flex;
            height: 80%; /* 尺標高度 */
            background: #fff;
            border: 2px solid #5d4037;
            border-radius: 4px;
            padding: 2px;
        }

        /* 數字尺標 */
        .num-ruler {
            display: flex;
            flex-direction: column-reverse;
            justify-content: space-between;
            height: 100%;
            padding-right: 4px;
            border-right: 2px solid #5d4037;
            font-weight: 900;
            font-size: 13px;
        }

        /* 菜盤內部 */
        .tray-inner {
            width: 40px;
            height: 100%;
            position: relative;
            background: #eee;
            display: flex;
            flex-direction: column-reverse;
        }
        .main-dish .tray-inner { width: 90px; }

        .food-bar { width: 100%; transition: height 0.4s; }
        .cabbage { background: #4caf50; }
        .tofu { background: #ffb74d; }
        .veggie { background: #81c784; }

        .name-tag {
            margin-top: 5px;
            background: #ffcc80;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
        }

        /* 底部操作區 (高度固定，確保紅線處按鈕不消失) */
        .bottom-ctrl {
            height: 160px;
            background: #fff;
            border-top: 6px solid #4caf50;
            border-radius: 20px 20px 0 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
            padding: 10px 0;
        }

        .stepper { display: flex; align-items: center; gap: 20px; }
        .btn-round {
            width: 65px; height: 65px; border-radius: 50%; border: none;
            font-size: 40px; color: white; font-weight: bold;
        }
        .btn-plus { background: #2196f3; box-shadow: 0 4px #1565c0; }
        .btn-minus { background: #ffa726; box-shadow: 0 4px #f57c00; }
        .scoop-val { font-size: 50px; font-weight: 900; min-width: 100px; text-align: center; }

        .btn-confirm {
            width: 85%;
            background: #2ecc71;
            color: white;
            border: none;
            padding: 12px;
            font-size: 26px;
            font-weight: bold;
            border-radius: 30px;
            box-shadow: 0 5px #27ae60;
        }
    </style>
</head>
<body>

<div class="top-info">
    <div class="status-box">
        需做：<span id="t-total" style="color:red">--</span> 盒 | 第 <span id="t-curr" style="color:blue">--</span> 盒
    </div>
</div>

<div class="main-game">
    <div class="dish-unit">
        <div class="scale-container">
            <div class="num-ruler"><div>0</div><div>10</div><div>20</div><div>30</div><div>40</div><div>50</div></div>
            <div class="tray-inner"><div id="v0" class="food-bar tofu"></div></div>
        </div>
        <div class="name-tag">豆腐</div>
    </div>

    <div class="dish-unit main-dish">
        <div class="scale-container">
            <div class="num-ruler">
                <div>0</div><div>5</div><div>10</div><div>15</div><div>20</div><div>25</div><div>30</div><div>35</div><div>40</div><div>45</div><div>50</div>
            </div>
            <div class="tray-inner"><div id="v1" class="food-bar cabbage"></div></div>
        </div>
        <div class="name-tag" style="background:#4caf50; color:white;">高麗菜</div>
    </div>

    <div class="dish-unit">
        <div class="scale-container">
            <div class="num-ruler"><div>0</div><div>10</div><div>20</div><div>30</div><div>40</div><div>50</div></div>
            <div class="tray-inner"><div id="v2" class="food-bar veggie"></div></div>
        </div>
        <div class="name-tag">青菜</div>
    </div>
</div>

<div class="bottom-ctrl">
    <div class="stepper">
        <button class="btn-round btn-minus" onclick="change(-0.5)">－</button>
        <div class="scoop-val" id="disp">1.5</div>
        <button class="btn-round btn-plus" onclick="change(0.5)">＋</button>
    </div>
    <button class="btn-confirm" onclick="done()">確定打菜！</button>
</div>

<script>
    let total = 0, curr = 1, scoop = 1.5;
    let cabbageRemain = 0, sideStart = [0, 0];

    function init() {
        total = Math.floor(Math.random() * 5) + 4;
        curr = 1;
        cabbageRemain = Math.floor(Math.random() * 15) + 30; // 30~45
        sideStart = [Math.floor(Math.random()*10)+30, Math.floor(Math.random()*10)+30];
        document.getElementById('t-total').innerText = total;
        update();
    }

    function change(n) {
        scoop = Math.max(0.5, scoop + n);
        document.getElementById('disp').innerText = scoop.toFixed(1);
    }

    function update() {
        document.getElementById('t-curr').innerText = curr;
        document.getElementById('disp').innerText = scoop.toFixed(1);
        
        // 豆腐 (v0)
        let h0 = (sideStart[0] - (curr-1)*(sideStart[0]/total)) / 50 * 100;
        document.getElementById('v0').style.height = h0 + '%';
        
        // 高麗菜 (v1)
        let h1 = cabbageRemain / 50 * 100;
        document.getElementById('v1').style.height = h1 + '%';
        
        // 青菜 (v2)
        let h2 = (sideStart[1] - (curr-1)*(sideStart[1]/total)) / 50 * 100;
        document.getElementById('v2').style.height = h2 + '%';
    }

    function done() {
        if (cabbageRemain < scoop) {
            alert("菜不夠了！重新挑戰");
            init();
            return;
        }
        cabbageRemain = parseFloat((cabbageRemain - scoop).toFixed(1));
        if (curr >= total) {
            alert(cabbageRemain <= 1.5 ? "完美分完！太厲害了" : "剩下 " + cabbageRemain + " 格，可以更精準喔！");
            init();
        } else {
            curr++;
            update();
        }
    }

    init();
</script>
</body>
</html>
