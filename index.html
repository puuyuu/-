<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>分菜訓練</title>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body {
            font-family: sans-serif;
            background-color: #fffde7;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* 1. 極簡標題區：改為透明，不佔空間 */
        .header {
            width: 100%;
            padding: 5px;
            text-align: center;
        }
        h1 { margin: 0; font-size: 18px; color: #d84315; }
        .status-row { font-size: 22px; font-weight: bold; margin-top: 2px; }

        /* 2. 菜盤區：強制撐開高度，保證看得見菜 */
        .kitchen-area {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 10px;
            flex: 1; /* 自動佔滿中間所有空間 */
            padding: 10px 5px;
            min-height: 250px; /* 保底高度 */
        }

        .dish-group { display: flex; flex-direction: column; align-items: center; height: 100%; }
        .side-dish { transform: scale(0.8); opacity: 0.6; }
        .main-dish { transform: scale(1.1); z-index: 5; }

        .tray-box {
            display: flex;
            align-items: flex-end;
            background: #fff;
            padding: 5px;
            border-radius: 8px;
            border: 2px solid #bcaaa4;
            height: 85%; /* 讓菜盤長高 */
        }

        .ruler {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            font-size: 13px;
            padding-right: 5px;
            font-weight: bold;
            border-right: 2px solid #8d6e63;
        }

        .tray {
            width: 50px;
            height: 100%;
            background: #eee;
            position: relative;
            display: flex;
            flex-direction: column-reverse;
            border: 1px solid #8d6e63;
        }
        .main-dish .tray { width: 90px; border: 3px solid #4caf50; }

        .food { width: 100%; transition: height 0.4s; }
        .tofu { background: #ffcc80; }
        .cabbage { background: #4caf50; }
        .veggie { background: #80cbc4; }
        .dish-name { margin-top: 5px; font-size: 16px; font-weight: bold; }

        /* 3. 控制面板：維持在底部 */
        .control-card {
            background: #fff;
            width: 100%;
            padding: 15px 10px;
            border-radius: 20px 20px 0 0;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.1);
            text-align: center;
            border-top: 4px solid #4caf50;
        }
        .counter-tool { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 15px; }
        .btn-circle {
            width: 70px; height: 70px; border-radius: 50%; border: none; font-size: 40px;
            color: white; background: #42a5f5; font-weight: bold;
        }
        .btn-minus { background: #ffa726; }
        #scoop-display { font-size: 60px; font-weight: bold; min-width: 120px; }
        .btn-confirm {
            background: #2ecc71; color: white; border: none; padding: 15px;
            font-size: 28px; font-weight: bold; border-radius: 40px; width: 90%;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🍱 便當分菜小師傅</h1>
    <div class="status-row">
        需做：<span id="total-bento" style="color:red">--</span> 盒 | 
        第 <span id="current-bento" style="color:blue">--</span> 盒
    </div>
</div>

<div class="kitchen-area">
    <div class="dish-group side-dish">
        <div class="tray-box"><div class="ruler" id="r0"></div><div class="tray"><div id="food-0" class="food tofu"></div></div></div>
        <div class="dish-name">豆腐</div>
    </div>
    <div class="dish-group main-dish">
        <div class="tray-box"><div class="ruler" id="r1"></div><div class="tray"><div id="food-1" class="food cabbage"></div></div></div>
        <div class="dish-name" style="color:#2e7d32">高麗菜</div>
    </div>
    <div class="dish-group side-dish">
        <div class="tray-box"><div class="ruler" id="r2"></div><div class="tray"><div id="food-2" class="food veggie"></div></div></div>
        <div class="dish-name">青菜</div>
    </div>
</div>

<div class="control-card">
    <div class="counter-tool">
        <button class="btn-circle btn-minus" onclick="changeScoop(-0.5)">－</button>
        <div id="scoop-display">1.5</div>
        <button class="btn-circle btn-plus" onclick="changeScoop(0.5)">＋</button>
    </div>
    <button class="btn-confirm" onclick="doScoop()">確定打菜！</button>
</div>

<script>
    let total = 0, current = 1, scoopValue = 1.5;
    let foods = [{id:'food-0',start:0,curr:0},{id:'food-1',start:0,curr:0},{id:'food-2',start:0,curr:0}];

    function buildRulers() {
        const r1 = document.getElementById('r1');
        const r0 = document.getElementById('r0');
        const r2 = document.getElementById('r2');
        [r0, r1, r2].forEach(r => {
            r.innerHTML = '';
            for(let i=50; i>=0; i-=5) {
                const step = document.createElement('div');
                step.innerText = i;
                r.appendChild(step);
            }
        });
    }

    function initGame() {
        total = Math.floor(Math.random() * 5) + 4;
        current = 1;
        foods.forEach(f => {
            f.start = Math.floor(Math.random() * 20) + 30;
            f.curr = f.start;
        });
        document.getElementById('total-bento').innerText = total;
        updateUI();
    }

    function changeScoop(v) {
        scoopValue = Math.max(0.5, scoopValue + v);
        document.getElementById('scoop-display').innerText = scoopValue.toFixed(1);
    }

    function updateUI() {
        document.getElementById('current-bento').innerText = current;
        document.getElementById('scoop-display').innerText = scoopValue.toFixed(1);
        foods.forEach((f, i) => {
            let h = (i===1) ? (f.curr/50*100) : ((f.start-(current-1)*(f.start/total))/50*100);
            document.getElementById(f.id).style.height = h + '%';
        });
    }

    function doScoop() {
        if (foods[1].curr < scoopValue) {
            alert("菜不夠了！重新開始。");
            initGame();
            return;
        }
        foods[1].curr -= scoopValue;
        if (current >= total) {
            alert(foods[1].curr <= 1.0 ? "成功！" : "剩太多了！");
            initGame();
        } else {
            current++;
            updateUI();
        }
    }

    buildRulers();
    initGame();
</script>
</body>
</html>
