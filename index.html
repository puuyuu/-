<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>便當分菜小師傅 - 實戰訓練版</title>
    <style>
        :root {
            --wood: #f3e5ab;
            --button-green: #4caf50;
            --text-color: #4e342e;
        }

        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: #fffde7;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 10px;
        }

        .header {
            background: #ffffff;
            width: 95%;
            max-width: 700px;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
            text-align: center;
            margin-bottom: 15px;
            border: 4px solid #ffb74d;
        }

        h1 { margin: 5px 0; color: #d84315; font-size: 32px; }
        .status-text { font-size: 28px; font-weight: bold; margin: 5px 0; }

        .kitchen-area {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 15px;
            margin-bottom: 20px;
            width: 100%;
        }

        .dish-group { display: flex; flex-direction: column; align-items: center; }

        /* 側邊菜盤 */
        .side-dish .tray-box { transform: scale(0.8); opacity: 0.6; }
        
        /* 中間特大菜盤 */
        .main-dish .tray-box { 
            border: 6px solid #4caf50; 
            background: #f1f8e9;
            transform: scale(1.15);
            z-index: 10;
        }

        .tray-box {
            display: flex;
            align-items: flex-end;
            background: #ffffff;
            padding: 10px;
            border-radius: 15px;
            border: 3px solid #bcaaa4;
        }

        .ruler {
            height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            font-size: 16px;
            padding-right: 8px;
            color: #3e2723;
            font-weight: 900;
            border-right: 2px solid #8d6e63;
        }

        .ruler div { height: 0; display: flex; align-items: center; justify-content: flex-end; position: relative; }
        .ruler div::after { content: ""; position: absolute; right: -8px; width: 10px; height: 2px; background: #8d6e63; }

        .tray {
            width: 70px;
            height: 300px;
            background: #f5f5f5;
            position: relative;
            display: flex;
            flex-direction: column-reverse;
            overflow: hidden;
            border: 2px solid #8d6e63;
        }

        .main-dish .tray { width: 120px; } 

        .food { width: 100%; transition: height 0.6s ease; }
        .tofu { background: #ffcc80; }
        .cabbage { background: #4caf50; }
        .veggie { background: #80cbc4; }

        .dish-name {
            margin-top: 35px;
            font-size: 22px;
            font-weight: bold;
            padding: 5px 15px;
            border-radius: 10px;
        }

        /* 控制區 */
        .control-card {
            background: #ffffff;
            width: 90%;
            max-width: 500px;
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            text-align: center;
            border: 6px solid #4caf50;
        }

        .alert-msg { color: #d84315; font-size: 26px; font-weight: bold; min-height: 40px; margin-bottom: 10px; }

        .counter-tool { display: flex; justify-content: center; align-items: center; gap: 20px; margin: 15px 0; }
        .btn-circle {
            width: 80px; height: 80px; border-radius: 50%; border: none; font-size: 50px;
            color: white; cursor: pointer; box-shadow: 0 6px #999;
        }
        .btn-circle:active { transform: translateY(4px); box-shadow: 0 2px #666; }
        .btn-minus { background: #ffa726; }
        .btn-plus { background: #42a5f5; }

        #scoop-display { font-size: 72px; font-weight: bold; min-width: 140px; color: #212121; }
        .btn-confirm {
            background: var(--button-green); color: white; border: none; padding: 20px;
            font-size: 36px; font-weight: bold; border-radius: 60px; width: 100%; cursor: pointer;
            box-shadow: 0 8px #2e7d32;
        }

        .hint-text { color: #d84315; font-size: 20px; font-weight: bold; margin-bottom: 10px;}
    </style>
</head>
<body>

<div class="header">
    <h1>🍱 便當分菜小師傅</h1>
    <div class="status-text">挑戰：平均分給 <span id="total-bento" style="color:#d84315">--</span> 個便當</div>
    <div class="status-text">進度：第 <span id="current-bento" style="color:#1976d2">--</span> 個</div>
</div>

<div class="kitchen-area">
    <div class="dish-group side-dish">
        <div class="tray-box"><div class="ruler"></div><div class="tray"><div id="food-0" class="food tofu"></div></div></div>
        <div class="dish-name">滷豆腐</div>
    </div>

    <div class="dish-group main-dish">
        <div class="tray-box"><div class="ruler"></div><div class="tray"><div id="food-1" class="food cabbage"></div></div></div>
        <div class="dish-name" style="color:#2e7d32; font-size: 28px;">炒高麗菜 (算算看)</div>
    </div>

    <div class="dish-group side-dish">
        <div class="tray-box"><div class="ruler"></div><div class="tray"><div id="food-2" class="food veggie"></div></div></div>
        <div class="dish-name">燙青菜</div>
    </div>
</div>

<div class="control-card">
    <div id="alert-msg" class="alert-msg">請看盤子上的刻度！</div>
    
    <div class="counter-tool">
        <button class="btn-circle btn-minus" onclick="changeScoop(-0.5)">－</button>
        <div id="scoop-display">--</div>
        <button class="btn-circle btn-plus" onclick="changeScoop(0.5)">＋</button>
    </div>

    <button class="btn-confirm" id="btn-submit" onclick="doScoop()">確定分菜！</button>
</div>

<button onclick="initGame()" style="margin-top:20px; padding:15px 30px; font-size:20px; border-radius:10px; cursor:pointer;">開啟下一關挑戰</button>

<script>
    let total = 0;
    let current = 1;
    let foods = [
        { id: 'food-0', start: 0, current: 0 },
        { id: 'food-1', start: 0, current: 0 },
        { id: 'food-2', start: 0, current: 0 }
    ];
    let scoopValue = 1.0;
    let averageAmount = 0;

    function buildRulers() {
        const rulers = document.querySelectorAll('.ruler');
        rulers.forEach(r => {
            r.innerHTML = '';
            for(let i=50; i>=0; i-=5) {
                const step = document.createElement('div');
                step.innerText = i;
                r.appendChild(step);
            }
        });
    }

    function initGame() {
        total = Math.floor(Math.random() * 5) + 4; // 4-8個
        current = 1;
        
        // 1. 三道菜起始菜量隨機且不一樣，增加小數點增加計算難度
        foods.forEach((f) => {
            f.start = (Math.floor(Math.random() * 30) + 20) + (Math.random() > 0.5 ? 0.5 : 0);
            f.current = f.start;
        });

        averageAmount = foods[1].start / total;
        
        // 2. 起始數字「不准」是答案，隨機設定為一個極端值
        scoopValue = Math.random() > 0.5 ? 1.0 : 9.0;

        document.getElementById('total-bento').innerText = total;
        document.getElementById('alert-msg').innerText = "自己算算看，每盒要幾格？";
        document.getElementById('alert-msg').style.color = "#d84315";
        document.getElementById('btn-submit').disabled = false;
        
        updateDisplay();
    }

    function changeScoop(val) {
        scoopValue = Math.max(0.5, scoopValue + val);
        document.getElementById('scoop-display').innerText = scoopValue.toFixed(1);
    }

    function updateDisplay() {
        document.getElementById('current-bento').innerText = current;
        document.getElementById('scoop-display').innerText = scoopValue.toFixed(1);

        foods.forEach((f, index) => {
            let h;
            if(index === 1) {
                h = (f.current / 50 * 100);
            } else {
                let idealScoop = f.start / total;
                h = ((f.start - (current-1) * idealScoop) / 50 * 100);
            }
            document.getElementById(f.id).style.height = h + '%';
        });

        if (current > total / 2 && current <= total) {
            document.getElementById('alert-msg').innerText = "進度過半！剩下的要分準喔！";
        }
    }

    function doScoop() {
        // 3. 70% 規則：防止最後一個便當才在修正
        const minLimit = averageAmount * 0.3;
        const maxLimit = averageAmount * 1.7;

        if (scoopValue < minLimit) {
            alert(`打太少了！這盒菜太寒酸囉。\n(請重新心算)`);
            return;
        }
        if (scoopValue > maxLimit) {
            alert(`打太多了！後面會沒菜分喔。\n(請重新心算)`);
            return;
        }

        if (foods[1].current < scoopValue) {
            finish("失敗！菜不夠分了！", false);
            return;
        }

        foods[1].current = parseFloat((foods[1].current - scoopValue).toFixed(1));

        if (current === total) {
            // 判定：剩餘格數需小於 0.5 才算過關
            if (foods[1].current <= 0.5) {
                finish("大成功！完全分完！", true);
            } else {
                finish(`失敗！剩下 ${foods[1].current} 格太浪費了。`, false);
            }
        } else {
            current++;
            updateDisplay();
        }
    }

    function finish(msg, success) {
        const alertEl = document.getElementById('alert-msg');
        alertEl.innerText = msg;
        alertEl.style.color = success ? "#2e7d32" : "#c62828";
        document.getElementById('btn-submit').disabled = true;
        if(success) document.getElementById(foods[1].id).style.height = '0%';
    }

    buildRulers();
    initGame();
</script>

</body>
</html>
