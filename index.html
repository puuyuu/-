<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>便當小師傅 - 訓練程式</title>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body {
            font-family: "Microsoft JhengHei", "微軟正黑體", sans-serif;
            background-color: #fffde7;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* 標題區：更可愛的圓角卡片感 */
        .header {
            width: 95%;
            margin: 8px auto;
            padding: 8px;
            background: #ffffff;
            border-radius: 15px;
            border: 3px solid #ffb74d;
            box-shadow: 0 4px 0 #ffb74d;
            text-align: center;
        }
        h1 { margin: 0; font-size: 20px; color: #e64a19; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .status-row { 
            font-size: 24px; 
            font-weight: 900; 
            margin-top: 5px; 
            color: #4e342e;
        }

        /* 菜盤區：背景透明化，讓刻度更清楚 */
        .kitchen-area {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 10px;
            flex: 1;
            padding: 10px 5px 20px 5px;
        }

        .dish-group { display: flex; flex-direction: column; align-items: center; height: 100%; }
        .side-dish { transform: scale(0.85); opacity: 0.8; }
        .main-dish { transform: scale(1.15); z-index: 10; }

        .tray-box {
            display: flex;
            align-items: flex-end;
            background: #ffffff; 
            padding: 3px;
            border-radius: 8px;
            border: 3px solid #6d4c41;
            height: 90%;
            box-shadow: 2px 2px 0 rgba(0,0,0,0.1);
        }

        .ruler {
            height: 100%;
            display: flex;
            flex-direction: column-reverse;
            justify-content: space-between;
            font-size: 14px;
            padding-right: 5px;
            font-weight: 900;
            border-right: 2px solid #6d4c41;
            color: #000;
        }

        .tray {
            width: 45px;
            height: 100%;
            background: #ffffff; 
            position: relative;
            display: flex;
            flex-direction: column-reverse;
            overflow: hidden; 
            border: 1px solid #d7ccc8;
        }
        .main-dish .tray { width: 95px; border: 3px solid #4caf50; }

        .food { width: 100%; transition: height 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .tofu { background: #ffb74d; border-top: 2px solid #f57c00; }
        .cabbage { background: #66bb6a; border-top: 2px solid #2e7d32; }
        .veggie { background: #81c784; border-top: 2px solid #388e3c; }

        .dish-name { 
            margin-top: 8px; 
            font-size: 16px; 
            font-weight: bold; 
            background: #fff; 
            padding: 4px 12px; 
            border-radius: 20px; 
            border: 2px solid #ffb74d;
            color: #5d4037;
            box-shadow: 0 2px 0 #ffb74d;
        }

        /* 下方操作面板：可愛大按鈕 */
        .control-card {
            background: #ffffff;
            width: 100%;
            padding: 15px 10px 25px 10px;
            border-radius: 30px 30px 0 0;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.1);
            text-align: center;
            border-top: 8px solid #4caf50;
        }
        .counter-tool { display: flex; justify-content: center; align-items: center; gap: 25px; margin-bottom: 15px; }
        
        .btn-circle {
            width: 75px; height: 75px; border-radius: 50%; border: none; font-size: 45px;
            color: white; background: #42a5f5; font-weight: bold; 
            box-shadow: 0 6px 0 #1976d2;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-circle:active { transform: translateY(4px); box-shadow: 0 2px 0 #1976d2; }
        .btn-minus { background: #ffa726; box-shadow: 0 6px 0 #f57c00; }
        .btn-minus:active { box-shadow: 0 2px 0 #f57c00; }

        #scoop-display { font-size: 60px; font-weight: 900; min-width: 130px; color: #212121; text-shadow: 2px 2px 0 rgba(0,0,0,0.05); }
        
        .btn-confirm {
            background: #2ecc71; color: white; border: none; padding: 18px;
            font-size: 32px; font-weight: 900; border-radius: 50px; width: 90%;
            box-shadow: 0 8px 0 #27ae60;
            margin-bottom: 5px;
        }
        .btn-confirm:active { transform: translateY(4px); box-shadow: 0 4px 0 #27ae60; }
    </style>
</head>
<body>

<div class="header">
    <h1>🍱 便當分菜小師傅 🍱</h1>
    <div class="status-row">
        需做：<span id="total-bento" style="color:#d84315">--</span> 盒 | 第 <span id="current-bento" style="color:#1976d2">--</span> 盒
    </div>
</div>

<div class="kitchen-area">
    <div class="dish-group side-dish">
        <div class="tray-box"><div class="ruler" id="r0"></div><div class="tray"><div id="food-0" class="food tofu"></div></div></div>
        <div class="dish-name">滷豆腐</div>
    </div>
    <div class="dish-group main-dish">
        <div class="tray-box"><div class="ruler"
