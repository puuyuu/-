<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>便當小師傅</title>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: #fffde7;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 1. 頂部資訊區 (固定高度) */
        .header {
            height: 80px;
            text-align: center;
            padding-top: 10px;
        }
        .status-card {
            background: white;
            border: 3px solid #ff9800;
            border-radius: 15px;
            display: inline-block;
            padding: 5px 20px;
            font-size: 20px;
            font-weight: bold;
        }

        /* 2. 中間菜盤區 (自動伸縮) */
        .game-area {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 20px;
            gap: 10px;
        }

        .dish-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 90%;
        }

        /* 尺標與菜盤外框 */
        .tray-container {
            display: flex;
            align-items: flex-end;
            background: white;
            border: 2px solid #5d4037;
            border-radius: 5px;
            padding: 2px;
            height: 85%;
        }

        /* 尺標文字 */
        .ruler {
            display: flex;
            flex-direction: column-reverse;
            justify-content: space-between;
            height: 100%;
            padding-right: 5px;
            border-right: 2px solid #5d4037;
            font-weight: bold;
            font-size: 14px;
            color: black;
        }

        /* 菜盤內部 */
        .tray {
            width: 45px;
            height: 100%;
            background: #f5f5f5;
            position: relative;
            display: flex;
            flex-direction: column-reverse;
        }
        .main-dish .tray { width: 100px; }

        .food { width: 100%; transition: height 0.3s; }
        .tofu { background: #ffb74d; }
        .cabbage { background: #4caf50; }
        .veggie { background: #81c784; }

        .label {
            margin-top: 10px;
            background: #ffcc80;
            padding: 2px 10px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 16px;
        }

        /* 3. 下方按鈕區 (固定高度) */
        .footer {
            height: 180px;
            background: white;
            border-top: 5px solid #4caf50;
            border-radius: 30px 30px 0 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-bottom: 10px;
        }

        .control-row {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 10px;
        }

        .btn-round {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: none;
            font-size: 40px;
            color: white;
            font-weight: bold;
            box-shadow: 0 5px #ccc;
        }
        .btn-plus { background: #2196f3; box-shadow: 0 5px #1565c0; }
        .btn-minus { background: #ff9800; box-shadow: 0 5px #e65100; }
        .btn-round:active { transform: translateY(3px); box-shadow: none; }

        .scoop-num { font-size: 55px; font-weight: bold; min-width: 100px; text-align: center; }

        .btn-go {
            width: 90%;
            background: #4caf50;
            color: white;
            border: none;
            padding: 15px;
            font-size: 28px;
            font-weight: bold;
            border-radius: 40px;
            box-shadow: 0 6px #2e7d32;
        }
        .btn-go:active { transform: translateY(3px); box-shadow: none; }
    </style>
</head>
<body>

<div class="header">
    <div class="status-card">
        需做：<span id="total-txt" style="color:red">--</span> 盒 | 
        第 <span id="current-txt" style="color:blue">--</span> 盒
    </div>
</div>

<div class="game-area">
    <div class="dish-column">
        <div class="tray-container">
            <div class="ruler">
                <div>50</div><div>40</div><div>30</div><div>20</div><div>10</div><div>0</div>
            </div>
            <div class="tray"><div id="f0" class="food tofu"></div></div>
        </div>
        <div class="label">豆腐</div>
    </div>

    <div class="dish-column main-dish">
        <div class="tray-container">
            <div class="ruler">
                <div>50</div><div>45</div><div>40</div><div>35</div><div>30</div><div>25</div><div>20</div><div>15</div><div>10</div><div>5</div><div>0</div>
            </div>
            <div class="tray"><div id="f1" class="food cabbage"></div></div>
        </div>
        <div class="label" style="background:#4caf50; color:white;">高麗菜</div>
    </div>

    <div class="dish-column">
        <div class="tray-container">
            <div class="ruler">
                <div>50</div><div>40</div><div>30</div><div>20</div><div>10</div><div>0</div>
            </div>
            <div class="tray"><div id="f2" class="food veggie"></div></div>
        </div>
        <div class="label">青菜</div>
    </div>
</div>

<div class="footer">
    <div class="control-row">
        <button class="btn-round btn-minus" onclick="changeS(-0.5)">－</button>
        <div class="scoop-num" id="s-display">1.5</div>
        <button class="btn-round btn-plus" onclick="changeS(0.5)">＋</button>
    </div>
    <button class="btn-go" onclick="go()">確定打菜！</button>
</div>

<script>
    let total = 0, current = 1, scoop = 1.5;
    let v = [0, 0, 0]; // 豆腐, 高麗菜, 青菜 的值
    let startV = [0, 0, 0];

    function init() {
        total = Math.floor(Math.random() * 5) + 4;
        current = 1;
        // 隨機設定初始菜量 (25~45之間)
        v[0] = Math.floor(Math.random() * 20) + 25;
        v[1] = Math.floor(Math.random() * 20) + 25;
        v[2] = Math.floor(Math.random() * 20) + 25;
        startV = [...v];
        
        document.getElementById('total-txt').innerText = total;
        update();
    }

    function changeS(n) {
        scoop = Math.max(0.5, scoop + n);
        document.getElementById('s-display').innerText = scoop.toFixed(1);
    }

    function update() {
        document.getElementById('current-txt').innerText = current;
        document.getElementById('s-display').innerText = scoop.toFixed(1);
        
        // 更新菜量顯示 (百分比)
        // 豆腐跟青菜會隨盒數減少 (模擬情境)
        let h0 = (startV[0] - (current-1)*(startV[0]/total)) / 50 * 100;
        let h1 = v[1] / 50 * 100;
        let h2 = (startV[2] - (current-1)*(startV[2]/total)) / 50 * 100;

        document.getElementById('f0').style.height = h0 + '%';
        document.getElementById('f1').style.height = h1 + '%';
        document.getElementById('f2').style.height = h2 + '%';
    }

    function go() {
        if (v[1] < scoop) {
            alert("菜不夠了！請重新開始");
            init();
            return;
        }
        v[1] = parseFloat((v[1] - scoop).toFixed(1));
        if (current >= total) {
            alert(v[1] <= 1.5 ? "太棒了！精準分完！" : "剩太多了(" + v[1] + ")，再加油！");
            init();
        } else {
            current++;
            update();
        }
    }

    init();
</script>
</body>
</html>
